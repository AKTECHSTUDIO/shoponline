<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — ShopOnline</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
    :root {
      --bg:#0f1117; --surf:#1a1d27; --surf2:#242838; --surf3:#2e3348;
      --txt:#e8e6f0; --txt2:#8a8ea8; --line:rgba(255,255,255,.09);
      --terra:#e06840; --gold:#f0b040; --green:#40c080; --err:#e05060; --blue:#5888f8;
      --r:8px; --rl:14px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
    a{color:inherit;text-decoration:none}
    button{cursor:pointer;font-family:inherit}
    input,textarea,select{font-family:inherit}
    h1,h2,h3,h4{font-family:'Playfair Display',serif;line-height:1.2}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:var(--surf)}
    ::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:4px}

    /* LAYOUT */
    .layout{display:grid;grid-template-columns:220px 1fr;height:100vh}
    .sidebar{background:var(--surf);border-right:1px solid var(--line);display:flex;flex-direction:column;overflow:hidden}
    .logo{padding:18px 16px;border-bottom:1px solid var(--line)}
    .logo-title{font-size:1.15rem;font-weight:900;color:var(--txt)}
    .logo-title span{color:var(--terra)}
    .logo-sub{font-size:.7rem;color:var(--txt2);margin-top:2px}
    .sidenav{flex:1;overflow-y:auto;padding:10px 8px}
    .nav-group{font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--txt2);padding:12px 10px 5px}
    .nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);color:var(--txt2);font-size:.84rem;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:1px;border:none;background:none;width:100%;text-align:left}
    .nav-item:hover{background:var(--surf2);color:var(--txt)}
    .nav-item.active{background:rgba(224,104,64,.15);color:var(--terra)}
    .nav-item .ni{font-size:.95rem;width:18px;flex-shrink:0}
    .nav-badge{margin-left:auto;background:var(--terra);color:#fff;font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:10px}
    .sidebar-foot{padding:10px 8px;border-top:1px solid var(--line)}
    .sidebar-foot a{display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:.8rem;color:var(--txt2);border-radius:var(--r);transition:color .15s}
    .sidebar-foot a:hover{color:var(--terra)}

    /* MAIN */
    .main{display:flex;flex-direction:column;overflow:hidden}
    .topbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid var(--line);background:var(--surf);flex-shrink:0;gap:12px}
    .topbar-left{display:flex;align-items:center;gap:10px}
    .topbar-title{font-size:.92rem;font-weight:600}
    .dirty-dot{width:7px;height:7px;background:var(--gold);border-radius:50%;display:none}
    .dirty-dot.show{display:block}
    .topbar-right{display:flex;gap:8px}
    .content{flex:1;overflow-y:auto;padding:20px}

    /* CARDS */
    .card{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);padding:18px}
    .card-sm{padding:14px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
    .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .stat-n{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;line-height:1}
    .stat-l{font-size:.72rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

    /* BUTTONS */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:.8rem;font-weight:600;border:1.5px solid transparent;transition:all .15s;cursor:pointer;white-space:nowrap}
    .btn-p{background:var(--terra);color:#fff;border-color:var(--terra)}
    .btn-p:hover{filter:brightness(1.1)}
    .btn-g{background:transparent;color:var(--txt2);border-color:var(--line)}
    .btn-g:hover{color:var(--txt);border-color:var(--txt2)}
    .btn-ok{background:var(--green);color:#1a1d27;border-color:var(--green)}
    .btn-ok:hover{filter:brightness(1.05)}
    .btn-red{background:transparent;color:var(--err);border-color:var(--err)}
    .btn-red:hover{background:var(--err);color:#fff}
    .btn-blue{background:var(--blue);color:#fff;border-color:var(--blue)}
    .btn-sm{padding:5px 10px;font-size:.75rem}
    .btn:disabled{opacity:.5;cursor:not-allowed}

    /* FORMS */
    .fg{margin-bottom:14px}
    .fl{display:block;font-size:.72rem;font-weight:700;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
    .fi,.fs,.ft{width:100%;padding:8px 11px;background:var(--bg);border:1.5px solid var(--line);border-radius:var(--r);font-size:.84rem;color:var(--txt);outline:none;transition:border-color .15s}
    .fi:focus,.fs:focus,.ft:focus{border-color:var(--terra)}
    .ft{resize:vertical;min-height:70px}
    .fs{appearance:none;cursor:pointer}
    .fi-mono{font-family:'DM Mono',monospace;font-size:.8rem}
    .toggle-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surf2);border-radius:var(--r)}
    .toggle-label{flex:1;font-size:.84rem}
    .toggle-sub{font-size:.72rem;color:var(--txt2)}
    input[type=checkbox]{width:36px;height:20px;accent-color:var(--terra);cursor:pointer;flex-shrink:0}
    input[type=color]{width:34px;height:34px;border:1.5px solid var(--line);border-radius:var(--r);cursor:pointer;background:none;padding:2px}

    /* TABLE */
    .tbl{width:100%;border-collapse:collapse}
    .tbl th{text-align:left;padding:9px 12px;font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--txt2);border-bottom:1px solid var(--line)}
    .tbl td{padding:10px 12px;font-size:.82rem;border-bottom:1px solid var(--line);vertical-align:middle}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:rgba(255,255,255,.02)}

    /* BADGE */
    .badge{display:inline-block;padding:3px 8px;border-radius:100px;font-size:.68rem;font-weight:700}
    .b-new{background:rgba(88,136,248,.18);color:var(--blue)}
    .b-contacted{background:rgba(240,176,64,.18);color:var(--gold)}
    .b-done{background:rgba(64,192,128,.18);color:var(--green)}

    /* PUBLISH */
    .pub-bar{background:rgba(224,104,64,.1);border:1px solid rgba(224,104,64,.25);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px}
    .pub-bar p{font-size:.8rem;color:var(--terra)}

    /* MODAL */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px}
    .modal{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);padding:24px;max-width:640px;width:100%;max-height:85vh;overflow-y:auto}
    .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
    .modal-head h3{font-size:1.1rem}

    /* LOADING */
    .ov{position:fixed;inset:0;background:rgba(15,17,23,.8);z-index:9999;display:flex;align-items:center;justify-content:center}
    .spin{width:34px;height:34px;border:3px solid rgba(224,104,64,.2);border-top-color:var(--terra);border-radius:50%;animation:spin .65s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* TOAST */
    .toasts{position:fixed;top:14px;right:14px;z-index:9998;display:flex;flex-direction:column;gap:8px}
    .toast{background:var(--surf2);color:var(--txt);padding:10px 14px;border-radius:var(--r);font-size:.8rem;font-weight:500;border-left:3px solid var(--terra);box-shadow:0 8px 24px rgba(0,0,0,.5);animation:tin .25s ease;max-width:300px}
    .toast.ok{border-left-color:var(--green)}
    .toast.err{border-left-color:var(--err)}
    @keyframes tin{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}

    /* AUTH GATE */
    .gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
    .gate-box{background:var(--surf);border:1px solid var(--line);border-radius:var(--rl);padding:36px;max-width:360px;width:90%;text-align:center}

    /* SECTION HEADERS */
    .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .sh-t{font-size:.88rem;font-weight:700}

    /* Plan editor card */
    .plan-card{border:1px solid var(--line);border-radius:var(--rl);padding:14px;margin-bottom:12px}
    .plan-card.featured{border-color:var(--terra)}

    /* Code block */
    .code-block{background:var(--bg);border:1px solid var(--line);border-radius:var(--r);padding:14px;font-family:'DM Mono',monospace;font-size:.75rem;color:var(--green);white-space:pre-wrap;overflow-x:auto;max-height:300px;overflow-y:auto}

    /* Steps indicator */
    .step-ind{display:flex;gap:8px;margin-bottom:18px}
    .step-dot{width:8px;height:8px;border-radius:50%;background:var(--surf3)}
    .step-dot.done{background:var(--green)}
    .step-dot.active{background:var(--terra)}

    @media(max-width:800px){
      .layout{grid-template-columns:1fr}
      .sidebar{display:none}
      .grid4{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>

<!-- AUTH GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div id="gateSetup" style="display:none">
      <div style="font-size:2.2rem;margin-bottom:14px">🛠️</div>
      <h2 style="font-size:1.4rem;margin-bottom:6px">First-Time Setup</h2>
      <p style="font-size:.82rem;color:var(--txt2);margin-bottom:20px">No password set yet. Create your admin password to get started.</p>
      <input type="password" id="pwSetup" class="fi" placeholder="Create a password..." style="text-align:center;margin-bottom:8px;font-size:.95rem" autocomplete="new-password">
      <input type="password" id="pwSetupConfirm" class="fi" placeholder="Confirm password..." style="text-align:center;margin-bottom:4px;font-size:.95rem" autocomplete="new-password">
      <div id="pwSetupErr" style="display:none;font-size:.72rem;color:var(--err);margin-bottom:10px;text-align:left">❌ Passwords don't match or too short (min 6 chars)</div>
      <button class="btn btn-p" style="width:100%;justify-content:center;margin-top:8px" onclick="setupPassword()">Create Password & Enter →</button>
    </div>
    <div id="gateLogin">
      <div style="font-size:2.2rem;margin-bottom:14px">🔒</div>
      <h2 style="font-size:1.4rem;margin-bottom:6px">Admin Access</h2>
      <p style="font-size:.82rem;color:var(--txt2);margin-bottom:20px">Enter your password to open the dashboard</p>
      <input type="password" id="pwInput" class="fi" placeholder="Password..." style="text-align:center;margin-bottom:12px;font-size:.95rem" autocomplete="current-password">
      <button class="btn btn-p" style="width:100%;justify-content:center" onclick="checkAuth()">Unlock Dashboard →</button>
    </div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="layout" id="app" style="display:none">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-title">Shop<span>Online</span></div>
      <div class="logo-sub">Admin Panel</div>
    </div>
    <nav class="sidenav">
      <div class="nav-group">Dashboard</div>
      <button class="nav-item active" data-p="overview" onclick="nav(this)"><span class="ni">📊</span>Overview<span class="nav-badge" id="nbNew" style="display:none">0</span></button>
      <button class="nav-item" data-p="clients" onclick="nav(this)"><span class="ni">📥</span>Submissions</button>

      <div class="nav-group">Content</div>
      <button class="nav-item" data-p="site" onclick="nav(this)"><span class="ni">⚙️</span>Site Settings</button>
      <button class="nav-item" data-p="hero" onclick="nav(this)"><span class="ni">🏠</span>Hero Section</button>
      <button class="nav-item" data-p="services" onclick="nav(this)"><span class="ni">🛠️</span>Services</button>
      <button class="nav-item" data-p="portfolio" onclick="nav(this)"><span class="ni">🖼️</span>Portfolio</button>
      <button class="nav-item" data-p="pricing" onclick="nav(this)"><span class="ni">💰</span>Pricing Plans</button>
      <button class="nav-item" data-p="testimonials" onclick="nav(this)"><span class="ni">⭐</span>Testimonials</button>

      <div class="nav-group">System</div>
      <button class="nav-item" data-p="integrations" onclick="nav(this)"><span class="ni">🔗</span>Integrations</button>
      <button class="nav-item" data-p="publish" onclick="nav(this)"><span class="ni">🚀</span>Publish & Deploy</button>
      <button class="nav-item" data-p="settings" onclick="nav(this)"><span class="ni">🔑</span>Password & Security</button>
    </nav>
    <div class="sidebar-foot">
      <a href="/" target="_blank"><span>←</span> View Website</a>
      <a href="#" onclick="logout()"><span>🚪</span> Logout</a>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title" id="topTitle">Overview</div>
        <div class="dirty-dot" id="dirtyDot" title="Unsaved changes"></div>
      </div>
      <div class="topbar-right">
        <button class="btn btn-g btn-sm" onclick="loadAll()">↻ Reload</button>
        <button class="btn btn-g btn-sm" onclick="saveLocal()">💾 Save</button>
        <button class="btn btn-p btn-sm" onclick="nav(document.querySelector('[data-p=publish]'))">🚀 Publish</button>
      </div>
    </div>
    <div class="content" id="pg"></div>
  </div>
</div>

<!-- OVERLAYS -->
<div class="ov" id="ov" style="display:none"><div class="spin"></div></div>
<div class="toasts" id="tc"></div>

<!-- MODAL CONTAINER -->
<div class="modal-bg" id="modalBg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>

<script>
'use strict';
/* =============================================
   STATE
   ============================================= */
let S = { site:{}, pages:{}, clients:{submissions:[]}, dirty:false, currentPage:'overview', githubToken:'' };

/* =============================================
   AUTH
   ============================================= */
const PASS = localStorage.getItem('so_adm_p') || '';

function checkAuth(){
  const v = document.getElementById('pwInput').value;
  if(v===PASS || v===atob(localStorage.getItem('so_adm_h')||'')){
    localStorage.setItem('so_admin','true');
    localStorage.setItem('so_adm_h', btoa(v));
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='grid';
    loadAll();
  } else {
    toast('Incorrect password','err');
    document.getElementById('pwInput').value='';
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkAuth()});
document.getElementById('pwSetup').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pwSetupConfirm').focus()});
document.getElementById('pwSetupConfirm').addEventListener('keydown',e=>{if(e.key==='Enter')setupPassword()});

function setupPassword(){
  const p1 = document.getElementById('pwSetup').value;
  const p2 = document.getElementById('pwSetupConfirm').value;
  const err = document.getElementById('pwSetupErr');
  if(p1.length < 6 || p1 !== p2){ err.style.display='block'; return; }
  err.style.display='none';
  localStorage.setItem('so_adm_p', p1);
  localStorage.setItem('so_adm_h', btoa(p1));
  localStorage.setItem('so_admin','true');
  document.getElementById('gate').style.display='none';
  document.getElementById('app').style.display='grid';
  loadAll();
}

function logout(){
  localStorage.removeItem('so_admin');
  location.reload();
}

window.addEventListener('DOMContentLoaded',()=>{
  S.githubToken = localStorage.getItem('so_gh_token')||'';
  const alreadyIn = localStorage.getItem('so_admin')==='true'
                 || new URLSearchParams(location.search).get('admin')==='true';
  if(alreadyIn){
    document.getElementById('gate').style.display='none';
    document.getElementById('app').style.display='grid';
    loadAll();
    return;
  }
  // Show gate — decide login vs first-run setup
  const hasPassword = !!localStorage.getItem('so_adm_p');
  document.getElementById('gate').style.display='flex';
  document.getElementById('gateLogin').style.display = hasPassword ? 'block' : 'none';
  document.getElementById('gateSetup').style.display = hasPassword ? 'none' : 'block';
});

/* =============================================
   DATA LOADING
   ============================================= */
async function loadAll(){
  showOv(true);
  try {
    const v = '?v='+Date.now();
    [S.site, S.pages, S.clients] = await Promise.all([
      fetch('/data/site.json'+v).then(r=>r.json()).catch(()=>({})),
      fetch('/data/pages.json'+v).then(r=>r.json()).catch(()=>({})),
      fetch('/data/clients.json'+v).then(r=>r.json()).catch(()=>({submissions:[]}))
    ]);
    // merge localStorage submissions
    try{
      const loc = JSON.parse(localStorage.getItem('so_submissions')||'[]');
      const ids = new Set((S.clients.submissions||[]).map(x=>x.id));
      loc.filter(x=>!ids.has(x.id)).forEach(x=>S.clients.submissions.unshift(x));
    }catch(e){}
    // restore local edits
    try{
      const ls = localStorage.getItem('so_site_data'); if(ls) S.site=JSON.parse(ls);
      const lp = localStorage.getItem('so_pages_data'); if(lp) S.pages=JSON.parse(lp);
    }catch(e){}
    updateBadge();
    render();
  } catch(e){ toast('Load error: '+e.message,'err'); }
  showOv(false);
}

function saveLocal(){
  localStorage.setItem('so_site_data', JSON.stringify(S.site));
  localStorage.setItem('so_pages_data', JSON.stringify(S.pages));
  S.dirty=false;
  document.getElementById('dirtyDot').classList.remove('show');
  toast('Saved locally. Click Publish to deploy.','ok');
}

function markDirty(){
  S.dirty=true;
  document.getElementById('dirtyDot').classList.add('show');
}

function updateBadge(){
  const n = (S.clients.submissions||[]).filter(x=>x.status==='new'||!x.status).length;
  const el = document.getElementById('nbNew');
  if(el){ el.textContent=n; el.style.display=n?'inline':'none'; }
}

/* =============================================
   NAVIGATION
   ============================================= */
function nav(el){
  if(!el) return;
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  S.currentPage = el.dataset.p;
  document.getElementById('topTitle').textContent = el.textContent.trim().replace(/\d+$/,'');
  render();
}

function render(){
  const map = {overview,clients,site,hero,services,portfolio,pricing,testimonials,integrations,publish,settings};
  const html = map[S.currentPage] ? map[S.currentPage]() : '<p style="color:var(--txt2)">Page coming soon</p>';
  document.getElementById('pg').innerHTML = html;
  bindAll();
}

/* =============================================
   TOAST / OV / MODAL
   ============================================= */
function toast(msg,type=''){
  const t=document.createElement('div');
  t.className='toast '+(type||'');
  t.textContent=msg;
  document.getElementById('tc').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(14px)';t.style.transition='all .25s';setTimeout(()=>t.remove(),250)},3200);
}
function showOv(s){ document.getElementById('ov').style.display=s?'flex':'none'; }
function openModal(html){ document.getElementById('modalBox').innerHTML=html; document.getElementById('modalBg').style.display='flex'; }
function closeModal(){ document.getElementById('modalBg').style.display='none'; }

/* =============================================
   BIND EVENTS (called after each render)
   ============================================= */
function bindAll(){
  // Auto-bind data-bind inputs
  document.querySelectorAll('[data-bind]').forEach(el=>{
    el.addEventListener('input',()=>{
      const path = el.dataset.bind.split('.');
      let obj = S[path[0]];
      if(!obj) return;
      for(let i=1;i<path.length-1;i++){
        if(obj[path[i]]===undefined) obj[path[i]]={};
        obj=obj[path[i]];
      }
      obj[path[path.length-1]] = el.type==='checkbox' ? el.checked : el.value;
      markDirty();
    });
  });
}

/* =============================================
   PAGE: OVERVIEW
   ============================================= */
function overview(){
  const subs = S.clients.submissions||[];
  const newC = subs.filter(x=>!x.status||x.status==='new').length;
  const now = new Date();
  const monthC = subs.filter(x=>{ const d=new Date(x.timestamp); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); }).length;
  const recent = subs.slice(0,6);
  return `
  <div class="grid4">
    <div class="card stat-card"><div class="stat-l">Total Leads</div><div class="stat-n" style="color:var(--terra)">${subs.length}</div></div>
    <div class="card stat-card"><div class="stat-l">New (Unread)</div><div class="stat-n" style="color:var(--blue)">${newC}</div></div>
    <div class="card stat-card"><div class="stat-l">This Month</div><div class="stat-n" style="color:var(--green)">${monthC}</div></div>
    <div class="card stat-card"><div class="stat-l">Plans Active</div><div class="stat-n">${(S.pages.pricing?.plans||[]).length}</div></div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="sh"><div class="sh-t">Recent Submissions</div><button class="btn btn-g btn-sm" onclick="nav(document.querySelector('[data-p=clients]'))">All →</button></div>
      ${recent.length ? recent.map(s=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)">
          <div>
            <div style="font-weight:600;font-size:.84rem">${esc(s.shopName||'?')}</div>
            <div style="font-size:.72rem;color:var(--txt2)">${esc(s.name)} · ${esc(s.category||'')}</div>
          </div>
          <span class="badge b-${s.status||'new'}">${s.status||'new'}</span>

      <div class="fg"><div class="fl">Budget</div><div>${esc(s.budget)}</div></div>

      <div class="code-block">${esc(s.promptSummary)}</div>
      <button class="btn btn-g btn-sm" style="margin-top:8px" onclick="navigator.clipboard.writeText(${JSON.stringify(s.promptSummary)}).then(()=>toast('Copied!','ok'))">📋 Copy Prompt</button>
    </div>` : ''}

      <a href="https://wa.me/${(s.whatsapp||'').replace(/\D/g,'')}?text=Hi+${encodeURIComponent(s.name)}%2C+this+is+ShopOnline+regarding+your+enquiry." target="_blank" class="btn btn-ok">💬 WhatsApp</a>
      <a href="mailto:${s.email}?subject=Your ShopOnline Enquiry&body=Hi ${s.name}," class="btn btn-blue">📧 Email</a>
    </div>
  `);
}

function exportCSV(){
  const subs = S.clients.submissions||[];
  if(!subs.length){toast('No submissions to export','err');return;}
  const headers = ['id','timestamp','name','shopName','category','whatsapp','email','location','budget','timeline','status'];
  const rows = subs.map(s=>headers.map(h=>`"${(s[h]||'').toString().replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','),...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='shoponline_leads_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  toast('CSV exported','ok');
}

function clearLocalSubs(){
  if(!confirm('Remove locally-stored submissions? (Does not affect server data)')) return;
  localStorage.removeItem('so_submissions');
  S.clients.submissions = S.clients.submissions.filter(s=>s.id==='c_sample_001');
  toast('Local submissions cleared','ok');
  render();
}

async function testGitHub(){
  saveGitHub();

  const token  = S.githubToken || localStorage.getItem('so_gh_token');
  const owner  = localStorage.getItem('so_gh_owner');
  const repo   = localStorage.getItem('so_gh_repo');
  const branch = localStorage.getItem('so_gh_branch') || 'main';
  const btn    = document.getElementById('ghTestBtn');
  const result = document.getElementById('ghTestResult');

  if(!token || !owner || !repo){
    result.innerHTML = showTestErr('Fill in Token, Username, Repo Name, and Branch first.');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Testing...';
  result.innerHTML = '<div style="color:var(--gold);font-size:.78rem">⏳ Connecting to GitHub...</div>';

  // GitHub API fully supports CORS — requests from any origin work fine
  // "Failed to fetch" = network-level block (offline, firewall, or token issue pre-flight)
  const headers = {
    'Authorization': `token ${token}`,   // "token" prefix works for all token types
    'Accept': 'application/vnd.github+json',
    'X-GitHub-Api-Version': '2022-11-28'
  };

  // Helper: distinguish network error from API error
  async function ghFetch(url){
    let res;
    try {
      res = await fetch(url, { headers });
    } catch(networkErr){
      // TypeError: Failed to fetch = browser blocked the request
      const isOffline = !navigator.onLine;
      throw new Error(
        isOffline
          ? 'No internet connection. Check your network and try again.'
          : 'Network error — browser blocked the request.\n\n' +
            'This can happen if:\n' +
            '• Your token contains invalid characters or spaces\n' +
            '• A browser extension is blocking the request\n' +
            '• You are behind a corporate firewall/proxy\n\n' +
            'Try: Open DevTools → Network tab → click Test Connection again → see the failed request for details.'
      );
    }
    return res;
  }

  try {
    // Step 1: Validate token
    const userRes = await ghFetch('https://api.github.com/user');
    if(userRes.status === 401){
      throw new Error('Token is invalid or expired.\n\nFix: Go to github.com → Settings → Developer Settings → Personal Access Tokens → regenerate your token, then paste it again here.');
    }
    if(userRes.status === 403){
      throw new Error('Token exists but has no permission to read user info.\n\nFix: Regenerate your token and make sure "Contents: Read & Write" is selected.');
    }
    if(!userRes.ok){
      throw new Error(`GitHub returned HTTP ${userRes.status}. Try again in a moment.`);
    }
    const user = await userRes.json();

    // Step 2: Check repo exists and is accessible
    const repoRes = await ghFetch(`https://api.github.com/repos/${owner}/${repo}`);
    if(repoRes.status === 404){
      throw new Error(
        `Repo "${owner}/${repo}" not found.\n\n` +
        `Fix checklist:\n` +
        `• Username/Org: "${owner}" — must match exactly (case-sensitive)\n` +
        `• Repo Name: "${repo}" — must match exactly (case-sensitive)\n` +
        `• For fine-grained tokens: the repo must be explicitly listed in the token's repo access`
      );
    }
    if(repoRes.status === 403){
      throw new Error(`Token has no access to repo "${owner}/${repo}".\n\nFor fine-grained tokens: go to your token settings on GitHub and add "${repo}" to the selected repositories.`);
    }
    if(!repoRes.ok){
      throw new Error(`Repo check failed (HTTP ${repoRes.status}).`);
    }
    const repoData = await repoRes.json();

    // Step 3: Check branch exists
    const branchRes = await ghFetch(`https://api.github.com/repos/${owner}/${repo}/branches/${encodeURIComponent(branch)}`);
    if(branchRes.status === 404){
      throw new Error(
        `Branch "${branch}" not found in this repo.\n\n` +
        `The default branch is: "${repoData.default_branch}"\n\n` +
        `Fix: Change the Branch field to "${repoData.default_branch}" and save.`
      );
    }
    if(!branchRes.ok){
      throw new Error(`Branch check failed (HTTP ${branchRes.status}).`);
    }

    // ✅ All checks passed
    result.innerHTML = `
      <div style="background:rgba(64,192,128,.1);border:1px solid rgba(64,192,128,.25);border-radius:var(--r);padding:12px;line-height:1.8">
        <div style="color:var(--green);font-weight:700;margin-bottom:6px;font-size:.85rem">✅ Connection successful!</div>
        <div style="font-size:.75rem;color:var(--txt2)">
          <span style="color:var(--green)">✓</span> Token valid — logged in as <strong style="color:var(--txt)">${esc(user.login)}</strong><br>
          <span style="color:var(--green)">✓</span> Repo <strong style="color:var(--txt)">${esc(owner)}/${esc(repo)}</strong> found (${repoData.private ? '🔒 private' : '🌐 public'})<br>
          <span style="color:var(--green)">✓</span> Branch <strong style="color:var(--txt)">${esc(branch)}</strong> exists<br>
          <div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.08);color:var(--green)">🚀 Ready to publish!</div>
        </div>
      </div>`;
    toast('GitHub connected ✅', 'ok');

  } catch(e){
    result.innerHTML = showTestErr(e.message);
    toast('GitHub test failed', 'err');
  }

  btn.disabled = false;
  btn.textContent = '🔌 Test Connection';
}

function showTestErr(msg){
  const lines = msg.split('\n').map(l => l ? `<div style="margin-bottom:2px">${esc(l)}</div>` : '<div style="height:6px"></div>').join('');
  return `
    <div style="background:rgba(224,80,96,.08);border:1px solid rgba(224,80,96,.25);border-radius:var(--r);padding:12px">
      <div style="color:var(--err);font-weight:700;margin-bottom:8px;font-size:.82rem">❌ Connection failed</div>
      <div style="font-size:.75rem;color:var(--txt2);line-height:1.6;word-break:break-word">${lines}</div>
    </div>`;
}

  statusEl.innerHTML = '<div style="color:var(--gold);font-size:.78rem;padding:10px;background:rgba(240,176,64,.08);border-radius:var(--r)">⏳ Verifying token...</div>';

  const headers = {

    let testRes;
    try {
      testRes = await fetch('https://api.github.com/user', { headers });
    } catch(netErr){
      throw new Error(
        navigator.onLine
          ? 'Browser blocked the request to api.github.com.\n\nPossible causes:\n• Token has spaces or invalid characters — re-paste it\n• A browser extension is blocking the request\n• Corporate firewall or proxy\n\nTip: Open DevTools (F12) → Network tab → click Commit & Deploy again → look for the blocked request.'
          : 'No internet connection detected.'
      );
    }
    if(!testRes.ok){
      const d = await testRes.json().catch(()=>({}));
      throw new Error(d.message || `HTTP ${testRes.status}`);
    }
  } catch(e){
    btn.disabled = false;
    btn.innerHTML = '🚀 Commit & Deploy';
    statusEl.innerHTML = `
      <div style="background:rgba(224,80,96,.08);border:1px solid rgba(224,80,96,.3);border-radius:var(--r);padding:14px;font-size:.78rem">
        <div style="font-weight:700;color:var(--err);margin-bottom:8px">❌ GitHub Authentication Failed</div>
        <div style="color:var(--txt2);margin-bottom:10px;word-break:break-word">${esc(e.message)}</div>
        <div style="color:var(--txt2);line-height:1.7">
          <strong style="color:var(--txt)">How to fix:</strong><br>
          1. Go to <strong>Integrations</strong> and re-enter your GitHub token<br>
          2. Token needs <strong>Contents: Read &amp; Write</strong> permission<br>
          3. Fine-grained token: select your repo explicitly (not "All repositories")<br>
          4. Check the token has not expired
        </div>
      </div>`;
    toast('GitHub token error', 'err');
    return;
  }

  statusEl.innerHTML = '<div style="color:var(--gold);font-size:.78rem;padding:10px;background:rgba(240,176,64,.08);border-radius:var(--r)">⏳ Committing files to ' + esc(owner) + '/' + esc(repo) + '...</div>';

  const files = [
    { path:'data/site.json',  content: JSON.stringify(S.site, null, 2) },
    { path:'data/pages.json', content: JSON.stringify(S.pages, null, 2) }
  ];

  let allSuccess = true;
  const results = [];

  for(const file of files){
    try {
      // Get current SHA (needed for update). 404 = file doesn't exist yet → create it.
      let sha = null;
      let getRes;
      try {
        getRes = await fetch(
          `https://api.github.com/repos/${owner}/${repo}/contents/${file.path}?ref=${encodeURIComponent(branch)}`,
          { headers }
        );
      } catch(netErr) {
        throw new Error(navigator.onLine
          ? 'Browser blocked the request. Try opening admin on a deployed URL instead of localhost.'
          : 'No internet connection.');
      }

      if(getRes.ok){
        const d = await getRes.json();
        sha = d.sha || null;
      } else if(getRes.status === 404){
        sha = null; // file will be created fresh
      } else {
        const d = await getRes.json().catch(()=>({}));
        const hint = getRes.status === 401 || getRes.status === 403
          ? ' — check token permissions'
          : getRes.status === 422
          ? ` — repo "${owner}/${repo}" not found or branch "${branch}" missing`
          : '';
        throw new Error(`GET failed (${getRes.status}): ${d.message || getRes.statusText}${hint}`);
      }

      // Encode content as base64 (UTF-8 safe)
      const encoded = btoa(unescape(encodeURIComponent(file.content)));
      const body = { message: msg, content: encoded, branch };
      if(sha) body.sha = sha; // required for update, omit for new file

      let putRes;
      try {
        putRes = await fetch(
          `https://api.github.com/repos/${owner}/${repo}/contents/${file.path}`,
          { method:'PUT', headers, body: JSON.stringify(body) }
        );
      } catch(netErr) {
        throw new Error('Network error during commit. Check your connection.');
      }

      if(!putRes.ok){
        const d = await putRes.json().catch(()=>({}));
        throw new Error(`PUT failed (${putRes.status}): ${d.message || putRes.statusText}`);
      }

      results.push({ ok:true, file: file.path, note: sha ? 'updated' : 'created' });
    } catch(e){
      results.push({ ok:false, file: file.path, error: e.message });
      allSuccess = false;
    }
  }

  btn.disabled = false;
  btn.innerHTML = '🚀 Commit & Deploy';

  const rows = results.map(r => r.ok
    ? `<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)">
        <span style="color:var(--green)">✅</span>
        <span style="font-family:monospace;font-size:.75rem">${esc(r.file)}</span>
        <span style="color:var(--txt2);font-size:.7rem">(${r.note})</span>
       </div>`
    : `<div style="padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:var(--err)">❌</span>
          <span style="font-family:monospace;font-size:.75rem">${esc(r.file)}</span>
        </div>
        <div style="font-size:.72rem;color:var(--err);margin-top:3px;padding-left:22px;word-break:break-word">${esc(r.error)}</div>
       </div>`
  ).join('');

  if(allSuccess){
    statusEl.innerHTML = `
      <div style="background:rgba(64,192,128,.08);border:1px solid rgba(64,192,128,.2);border-radius:var(--r);padding:14px;font-size:.78rem">
        <div style="font-weight:700;color:var(--green);margin-bottom:10px">✅ Published! Redeploy starts in ~30 seconds.</div>
        ${rows}
        <div style="margin-top:10px;font-size:.72rem;color:var(--txt2)">Committed to <strong style="color:var(--txt)">${esc(owner)}/${esc(repo)}</strong> on branch <strong style="color:var(--txt)">${esc(branch)}</strong></div>
      </div>`;
    S.dirty = false;
    document.getElementById('dirtyDot').classList.remove('show');
    toast('Published to GitHub! 🚀', 'ok');
  } else {
    statusEl.innerHTML = `
      <div style="background:rgba(224,80,96,.08);border:1px solid rgba(224,80,96,.25);border-radius:var(--r);padding:14px;font-size:.78rem">
        <div style="font-weight:700;color:var(--err);margin-bottom:10px">❌ Some files failed to commit</div>
        ${rows}
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06);color:var(--txt2);line-height:1.7">
          <strong style="color:var(--txt)">Common fixes:</strong><br>
          • Repo name is case-sensitive — double-check spelling in <strong>Integrations</strong><br>
          • Token must have <strong>Contents: Read &amp; Write</strong> scope for this repo<br>
          • Branch must exist — check if it's <strong>main</strong> or <strong>master</strong><br>
          • Fine-grained token: your repo must be explicitly selected
        </div>
      </div>`;
    toast('Commit failed — see details below', 'err');
  }
}

function downloadJSON(type){
  const map = { site:S.site, pages:S.pages, clients:S.clients };
  const data = map[type];
  const a=document.createElement('a');
  a.href='data:application/json;charset=utf-8,'+encodeURIComponent(JSON.stringify(data,null,2));
  a.download=`${type}.json`;
  a.click();
  toast('Downloaded '+type+'.json','ok');
}

function previewJSON(type){
  const map = { site:S.site, pages:S.pages, clients:S.clients };
  const json = JSON.stringify(map[type],null,2);
  openModal(`
    <div class="modal-head">
      <h3>${type}.json</h3>
      <div style="display:flex;gap:8px">
        <button class="btn btn-g btn-sm" onclick="navigator.clipboard.writeText(${JSON.stringify(json)}).then(()=>toast('Copied!','ok'))">📋 Copy</button>
        <button class="btn btn-g btn-sm" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="code-block">${esc(json)}</div>
  `);
}

function changePassword(){
  // Hide previous errors and success
  ['pwCurrentErr','pwNewErr','pwConfirmErr','pwSuccess'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });

  const current  = document.getElementById('pwCurrent').value;
  const newPw    = document.getElementById('pwNew').value;
  const confirm  = document.getElementById('pwConfirm').value;

  // Get the actual stored password
  const stored = localStorage.getItem('so_adm_p') || '';
  const storedHash = localStorage.getItem('so_adm_h') || '';

  let valid = true;

  // Check current password
  if(current !== stored && current !== atob(storedHash || btoa(''))){
    document.getElementById('pwCurrentErr').style.display = 'block';
    valid = false;
  }
  // Check new password length
  if(newPw.length < 6){
    document.getElementById('pwNewErr').style.display = 'block';
    valid = false;
  }
  // Check confirmation match
  if(newPw !== confirm){
    document.getElementById('pwConfirmErr').style.display = 'block';
    valid = false;
  }

  if(!valid) return;

  // Save new password
  localStorage.setItem('so_adm_p', newPw);
  localStorage.setItem('so_adm_h', btoa(newPw));

  // Clear inputs
  document.getElementById('pwCurrent').value = '';
  document.getElementById('pwNew').value = '';
  document.getElementById('pwConfirm').value = '';

  // Show success
  document.getElementById('pwSuccess').style.display = 'block';
  toast('Password changed successfully!', 'ok');
}

function clearAllLocal(){
  if(!confirm('This will clear ALL local admin data including:\n• Saved password\n• GitHub token\n• Local form submissions\n• Locally edited JSON\n\nYou will be logged out. Continue?')) return;
  const keys = ['so_admin','so_adm_p','so_adm_h','so_gh_token','so_gh_owner','so_gh_repo','so_gh_branch','so_submissions','so_site_data','so_pages_data'];
  keys.forEach(k => localStorage.removeItem(k));
  toast('All local data cleared. Logging out...', 'ok');
  setTimeout(() => location.reload(), 1500);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
